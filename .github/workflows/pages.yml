name: Deploy Study Plans app to GitHub Pages

# Publishes the app/ folder (plan.html, manifest.json, sw.js, plans/, icons/)
# as a static site. That live HTTPS URL is what makes "online" features
# actually work: the plans/index.json feed the app checks for updates,
# and the Trusted Web Activity wrapper Google Play packaging needs
# (see app/PUBLISHING.md).
#
# configure-pages' `enablement: true` below makes it create the Pages site
# itself on first run (its default is to error out instead, expecting a
# manual "Settings -> Pages -> Source -> GitHub Actions" click first) — so
# there's no manual repo-settings step needed before this works.

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload app/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
